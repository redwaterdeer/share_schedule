<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Share Schedule</title>
    <!-- 한 화면만 보이게 + 모바일 첫 페인트: 외부 CSS 지연 시에도 폭·숨김 유지 -->
    <style>
      .view:not(.view-active) {
        display: none !important;
      }
      .view.view-active {
        display: block !important;
      }
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      body {
        margin: 0;
        width: 100%;
      }
      .app-shell {
        width: 100%;
        max-width: 420px;
        margin-left: auto;
        margin-right: auto;
        padding: 18px 22px 28px;
        box-sizing: border-box;
      }
      .top-indicator {
        display: none !important;
      }
    </style>
    <link rel="preload" href="./styles.css" as="style" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="login-view" class="view view-active">
        <div class="top-indicator">1</div>

        <div class="logo-wrap" aria-label="Share Schedule 로고">
          <div class="logo-text">
            <div class="logo-line"><span class="logo-big">S</span><span class="logo-rest">hare</span></div>
            <div class="logo-line"><span class="logo-big">S</span><span class="logo-rest">chedule</span></div>
          </div>
        </div>

        <h1 class="title">쉐어 스케줄</h1>

        <form id="login-form" class="login-form">
          <div class="field-row">
            <label class="field-label" for="user-id">ID</label>
            <input id="user-id" name="id" type="text" autocomplete="username" required />
          </div>
          <div class="field-row">
            <label class="field-label" for="user-pw">PW</label>
            <input id="user-pw" name="pw" type="password" autocomplete="current-password" required />
          </div>

          <label class="remember-row">
            <input id="remember-me" type="checkbox" />
            <span class="remember-mark" aria-hidden="true"></span>
            <span class="remember-text">간편로그인 정보 저장</span>
          </label>

          <div class="action-row">
            <button type="submit" class="pill-btn">로그인</button>
            <button type="button" id="signup-btn" class="pill-btn">가입</button>
          </div>
        </form>
      </section>

      <section id="signup-view" class="view">
        <header class="page-header">
          <h1 id="signup-page-title" class="page-title">신규 가입</h1>
          <div class="top-indicator">9</div>
        </header>

        <form id="signup-register-form" class="login-form">
          <div class="field-row">
            <label class="field-label" for="signup-user-id">I D</label>
            <input id="signup-user-id" name="id" type="text" autocomplete="username" required />
          </div>
          <div class="field-row">
            <label class="field-label" for="signup-user-pw">PW</label>
            <input id="signup-user-pw" name="pw" type="password" autocomplete="new-password" required />
          </div>

          <div class="action-row action-row-right">
            <button type="button" id="signup-cancel-btn" class="pill-btn">취소</button>
            <button type="submit" class="pill-btn">저장</button>
          </div>
        </form>
      </section>

      <section id="menu-view" class="view">
        <div class="top-indicator">2</div>

        <div class="logo-wrap" aria-label="Share Schedule 로고">
          <div class="logo-text">
            <div class="logo-line"><span class="logo-big">S</span><span class="logo-rest">hare</span></div>
            <div class="logo-line"><span class="logo-big">S</span><span class="logo-rest">chedule</span></div>
          </div>
        </div>

        <div class="menu-actions">
          <button type="button" id="create-room-btn" class="big-pill-btn">신규 개설</button>
          <button type="button" id="join-room-btn" class="big-pill-btn">공유방 입장</button>
        </div>

        <div class="menu-foot">
          <button type="button" id="edit-account-btn" class="link-btn">가입수정</button>
          <span class="menu-divider">|</span>
          <button type="button" id="menu-logout-btn" class="link-btn">로그아웃</button>
        </div>

        <div id="menu-master-foot" class="menu-foot menu-master-foot">
          <button type="button" id="menu-all-accounts-btn" class="link-btn">모든 계정 확인</button>
        </div>
      </section>

      <section id="all-accounts-view" class="view">
        <header class="page-header">
          <h1 class="page-title">모든 계정 확인</h1>
          <div class="top-indicator">10</div>
        </header>

        <div class="master-accounts-wrap">
          <div id="master-accounts-list" class="master-accounts-list" role="list"></div>
        </div>

        <div class="action-row action-row-right">
          <button type="button" id="master-accounts-back-btn" class="pill-btn">home</button>
        </div>

        <div class="menu-foot menu-foot-fixed">
          <button type="button" id="master-accounts-edit-account" class="link-btn">가입수정</button>
          <span class="menu-divider">|</span>
          <button type="button" id="master-accounts-logout" class="link-btn">로그아웃</button>
        </div>
      </section>

      <section id="create-room-view" class="view">
        <div class="top-indicator">3</div>

        <h1 class="page-title">공유방 개설</h1>

        <form id="create-room-form" class="create-room-form">
          <div class="center-label-wrap">
            <span class="center-label">공유방 이름</span>
          </div>

          <input id="room-name" name="roomName" type="text" class="big-input" autocomplete="off" required />

          <div class="action-row action-row-right">
            <button type="button" id="create-room-cancel" class="pill-btn">취소</button>
            <button type="submit" class="pill-btn">저장</button>
          </div>
        </form>

        <div class="menu-foot menu-foot-fixed">
          <button type="button" id="create-room-edit-account" class="link-btn">가입수정</button>
          <span class="menu-divider">|</span>
          <button type="button" id="create-room-logout" class="link-btn">로그아웃</button>
        </div>
      </section>

      <section id="join-room-view" class="view">
        <div class="top-indicator">7</div>

        <h1 class="page-title">공유방 입장</h1>

        <form id="join-room-form" class="create-room-form">
          <div class="center-label-wrap">
            <span class="center-label">소속된 공유방</span>
          </div>

          <div class="room-list-wrap">
            <ul id="my-rooms-list" class="room-list" aria-label="소속된 공유방 목록"></ul>
          </div>

          <div class="action-row action-row-right">
            <button type="button" id="join-room-cancel" class="pill-btn">home</button>
            <button type="button" id="join-room-delete" class="pill-btn">삭제</button>
          </div>
        </form>

        <div class="menu-foot menu-foot-fixed">
          <button type="button" id="join-room-edit-account" class="link-btn">가입수정</button>
          <span class="menu-divider">|</span>
          <button type="button" id="join-room-logout" class="link-btn">로그아웃</button>
        </div>
      </section>

      <section id="calendar-view" class="view">
        <p id="cal-room-name" class="cal-room-name" aria-live="polite"></p>
        <header class="calendar-top">
          <div class="ym-selectors">
            <div class="ym-cell">
              <span class="ym-value" id="cal-year">2026</span>
              <div class="ym-arrows">
                <button type="button" class="ym-arrow" data-target="year" data-dir="up" aria-label="년도 증가">▲</button>
                <button type="button" class="ym-arrow" data-target="year" data-dir="down" aria-label="년도 감소">▼</button>
              </div>
            </div>
            <div class="ym-cell">
              <span class="ym-value" id="cal-month">5</span>
              <div class="ym-arrows">
                <button type="button" class="ym-arrow" data-target="month" data-dir="up" aria-label="월 증가">▲</button>
                <button type="button" class="ym-arrow" data-target="month" data-dir="down" aria-label="월 감소">▼</button>
              </div>
            </div>
          </div>

          <div class="calendar-icons">
            <button type="button" class="icon-btn" id="cal-members-btn" aria-label="멤버">
              <svg viewBox="0 0 24 24" width="32" height="32" aria-hidden="true">
                <circle cx="9" cy="8" r="3.6" fill="#7d7d7d" />
                <path d="M3 19c0-3.3 2.7-6 6-6s6 2.7 6 6v1H3v-1z" fill="#7d7d7d" />
                <circle cx="16" cy="9" r="3" fill="#b5b5b5" />
                <path d="M12.5 18.5c.6-2.1 2.4-3.8 4.6-4.3 2.5-.6 4.9 1.3 4.9 3.8v2h-9.5v-1.5z" fill="#b5b5b5" />
              </svg>
            </button>
            <button type="button" class="icon-btn" id="cal-home-btn" aria-label="홈">
              <svg viewBox="0 0 24 24" width="32" height="32" aria-hidden="true">
                <path d="M3 11.5L12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1v-8.5z" fill="#7d7d7d" />
              </svg>
            </button>
            <button type="button" class="icon-btn" id="cal-edit-btn" aria-label="편집">
              <svg viewBox="0 0 24 24" width="32" height="32" aria-hidden="true">
                <path d="M4 6c0-1.1.9-2 2-2h9l4 4v10c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2V6z" fill="#cfcfcf" />
                <path d="M15 4v3a1 1 0 0 0 1 1h3" fill="#9a9a9a" />
                <path d="M14.5 11.5l3 3-5 5H9.5v-3l5-5z" fill="#f46524" />
              </svg>
            </button>
          </div>

          <div class="top-indicator">4</div>
        </header>

        <div class="calendar-grid" id="calendar-grid" aria-label="월간 캘린더"></div>

        <div class="menu-foot menu-foot-calendar">
          <button type="button" id="cal-edit-account-btn" class="link-btn">가입수정</button>
          <span class="menu-divider">|</span>
          <button type="button" id="cal-logout-btn" class="link-btn">로그아웃</button>
        </div>
      </section>

      <section id="shared-friend-view" class="view">
        <header class="page-header">
          <h1 class="page-title">공유 친구 설정</h1>
          <div class="top-indicator">6</div>
        </header>

        <form id="shared-friend-form" class="create-room-form">
          <div class="center-label-wrap">
            <span class="center-label">공유 친구 ID</span>
          </div>

          <input
            id="shared-friend-id"
            name="friendId"
            type="text"
            class="big-input"
            autocomplete="off"
            required
          />

          <div class="action-row action-row-right">
            <button type="button" id="shared-friend-cancel" class="pill-btn">취소</button>
            <button type="submit" class="pill-btn">저장</button>
          </div>
        </form>

        <div class="menu-foot menu-foot-fixed">
          <button type="button" id="shared-friend-edit-account" class="link-btn">가입수정</button>
          <span class="menu-divider">|</span>
          <button type="button" id="shared-friend-logout" class="link-btn">로그아웃</button>
        </div>
      </section>

      <section id="schedule-create-view" class="view">
        <header class="page-header">
          <h1 id="schedule-create-page-title" class="page-title">일정 등록</h1>
          <div class="top-indicator">5</div>
        </header>

        <form id="schedule-create-form" class="schedule-create-form">
          <div class="sc-row">
            <label class="sc-label" for="sc-date">날짜</label>
            <input id="sc-date" name="date" type="date" class="sc-input" />
          </div>
          <div class="sc-row">
            <label class="sc-label" for="sc-category">유형</label>
            <select id="sc-category" name="category" class="sc-input sc-select">
              <option value="" disabled selected>선택해주세요</option>
              <option value="교회">교회</option>
              <option value="가족">가족</option>
              <option value="친척">친척</option>
              <option value="학교">학교</option>
              <option value="회사">회사</option>
              <option value="지인">지인</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="sc-row">
            <label class="sc-label" for="sc-division">구분</label>
            <select id="sc-division" name="division" class="sc-input sc-select">
              <option value="" disabled selected>선택해주세요</option>
              <option value="공유">공유</option>
              <option value="비공유">비공유</option>
            </select>
          </div>
          <div class="sc-row">
            <label class="sc-label" for="sc-title">제목</label>
            <input id="sc-title" name="title" type="text" class="sc-input" autocomplete="off" />
          </div>
          <div class="sc-row sc-row-content">
            <label class="sc-label sc-label-top" for="sc-content">내용</label>
            <textarea id="sc-content" name="content" class="sc-textarea" rows="8"></textarea>
          </div>

          <div class="action-row action-row-right">
            <button type="button" id="schedule-create-cancel" class="pill-btn">취소</button>
            <button type="submit" class="pill-btn">저장</button>
          </div>
        </form>

        <div class="menu-foot menu-foot-fixed">
          <button type="button" id="schedule-create-edit-account" class="link-btn">가입수정</button>
          <span class="menu-divider">|</span>
          <button type="button" id="schedule-create-logout" class="link-btn">로그아웃</button>
        </div>
      </section>

      <section id="registered-list-view" class="view">
        <header class="page-header">
          <h1 class="page-title">등록된 일정</h1>
          <div class="top-indicator">8</div>
        </header>

        <div class="reg-list-wrap">
          <div class="reg-list-header" aria-hidden="true">
            <span class="reg-list-hcell">유형</span>
            <span class="reg-list-hcell">구분</span>
            <span class="reg-list-hcell">작성자</span>
            <span class="reg-list-hcell">제목</span>
            <span class="reg-list-hcell reg-list-hcell-wide">내용</span>
            <span class="reg-list-hcell reg-list-hcell-remark">비고</span>
          </div>
          <div class="reg-list-scroll">
            <div id="reg-list-body" class="reg-list-body" role="list"></div>
          </div>
        </div>

        <div class="action-row action-row-right reg-list-actions">
          <button type="button" id="reg-list-home-btn" class="pill-btn">home</button>
          <button type="button" id="reg-list-prev-btn" class="pill-btn">이전</button>
        </div>

        <div class="menu-foot menu-foot-fixed">
          <button type="button" id="reg-list-edit-account" class="link-btn">가입수정</button>
          <span class="menu-divider">|</span>
          <button type="button" id="reg-list-logout" class="link-btn">로그아웃</button>
        </div>
      </section>

      <section id="schedule-view" class="view">
        <header class="schedule-header">
          <h2>내 일정</h2>
          <div class="user-actions">
            <span id="current-user"></span>
            <button id="logout-btn" class="small-btn" type="button">로그아웃</button>
          </div>
        </header>

        <form id="schedule-form" class="schedule-form">
          <input id="schedule-title" type="text" placeholder="일정 제목" required />
          <input id="schedule-date" type="date" required />
          <input id="schedule-time" type="time" required />
          <input id="schedule-member" type="text" placeholder="참여 멤버 (예: 철수, 영희)" required />
          <button type="submit" class="primary-btn">일정 등록</button>
        </form>

        <ul id="schedule-list" class="schedule-list"></ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
